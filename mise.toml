# Minimum `mise` version. If not matched, mise guides the user to update.
# -> Bump when relying on a newly introduced setting.
min_version = "2026.6.6" # CVE floor; raise as needed.

# ── 🛠️ tools ──────────────────────────────────────────────────────────────────
[tools]

# runtimes
node = "22" # LTS; CI previously used 20 — bundled npm 10.9.8 (matches packageManager)

# linters & formatters
prettier = "3"      # JS/JSON format
"npm:eslint" = "10" # JS lint (npm backend: not in aqua; needs node)
taplo = "0.10"      # TOML lint + format
yamlfmt = "0.21"    # YAML format
yamllint = "1"      # YAML structural lint (pipx backend; installed via uv, see pipx.uvx)
uv = "0.11"         # Python package manager — backs the pipx:yamllint install (pipx.uvx)
typos = "1"         # spell-check
lychee = "0.24"     # link checker
rumdl = "0.2"       # Markdown lint + format
shellcheck = "0.11" # shell lint (used by actionlint for run: blocks)
actionlint = "1"    # GitHub Actions lint
zizmor = "1"        # GitHub Actions security
pinact = "4"        # GitHub Actions pin SHAs
betterleaks = "1"   # secret scanner

# pre-commit
hk = "1.47.0" # full MAJOR.MINOR.PATCH — git-tag backend (matches `hk init`)

# ── 🌳 env ────────────────────────────────────────────────────────────────────
[env]
_.path = [
  "src/node_modules/.bin",
] # run project bins (eslint, prettier) without `npx`

# ── 📏 vars ───────────────────────────────────────────────────────────────────
[vars]
setup_version = "1" # Increment when setup steps change / users must re-run setup.

# ── ▶️ tasks ──────────────────────────────────────────────────────────────────
[tasks.check]
description = "Run all linters, formatters & validators as ran by pre-commit and in PR's CI"
alias = ["lint"]
usage = '''
    flag "--fix"              help="apply fixes instead of only reporting"
    flag "--all"              help="run on all files (default: staged only)"
    flag "--pr"               help="only files changed vs the default branch (conflicts with --all)"
    flag "--fail-fast"        help="stop at the first failing step (default: run all, report every failure)"
    flag "--step <step>"      var=#true help="run only these step(s)"
    flag "--skip-step <step>" var=#true help="skip these step(s)"
    complete "step" run="hk check --plan --all --json --no-progress 2>/dev/null | jq -r '.steps[].name'"
'''
run = '''
ff=${usage_fail_fast:+--fail-fast}; ff=${ff:---no-fail-fast}   # default to running every step
hk check $ff ${usage_fix:+--fix} ${usage_all:+--all} ${usage_pr:+--pr} \
  ${usage_step:+$(printf -- '--step %s ' $usage_step)} \
  ${usage_skip_step:+$(printf -- '--skip-step %s ' $usage_skip_step)}
'''

[tasks.test]
description = "Run tests (none yet — placeholder)"
# ordering only; depends run in parallel, don't see this task's env
depends = ["lint"]
run = "echo 'No tests yet.'"

[tasks.setup] # one-time, idempotent bootstrap; re-run when `enter` warns it's stale
description = "One-time, idempotent project bootstrap: install tools, then runtime deps"
# deps after `mise install`; stamp last (see setup:stamp wait_for)
depends_post = ["deps", "setup:stamp"]
run = "mise install"                   # installs tools; runtime deps live in the deps task

[tasks.deps] # install runtime/project dependencies; runnable on its own after a lockfile change
description = "Install runtime dependencies (cached; skipped when the lockfile is unchanged)"
dir = "src"                                                                                   # package.json + package-lock.json live under src/; sources/outputs resolve against it
sources = ["package.json", "package-lock.json"]
outputs = ["node_modules"]
run = "npm ci"

[tasks.build]
description = "Build the .alfredworkflow package"
depends = ["deps"] # node_modules must be vendored into src/ before zipping
usage = '''
    flag "--version <version>" help="version string to stamp into info.plist (e.g. v4.3.0)"
'''
run = '''
#!/usr/bin/env bash
set -euo pipefail

# Zip src/ (workflow source + vendored node_modules) into a distributable
# .alfredworkflow. The plist carries a placeholder version (1.3.37); stamp the
# real one in when --version is given, then restore it so the tree stays clean.
rm -rf build/
mkdir -p build/

if [ -n "${usage_version:-}" ]; then
  version_without_v="${usage_version#v}"
  artifact="build/alfred-imessage-otp-${usage_version}.alfredworkflow"
  cp src/info.plist src/info.plist.bak
  sed "s/1\\.3\\.37/${version_without_v}/g" src/info.plist.bak > src/info.plist
  trap 'mv -f src/info.plist.bak src/info.plist' EXIT
else
  artifact="build/alfred-imessage-otp.alfredworkflow"
fi

( cd src && find . -not -path '*/.git*' -not -path '*/build*' -not -name 'info.plist.bak' \
  -exec zip --symlinks "../${artifact}" {} + )
echo "Built ${artifact}"
'''

[tasks.clean]
description = "Clean build artifacts and vendored deps from src/"
run = '''
#!/usr/bin/env bash
set -euo pipefail
rm -rf build/
rm -rf src/node_modules/
echo "Cleaned build artifacts"
'''

[tasks."setup:stamp"] # write the version of the last run setup to .mise/setup
hide = true
quiet = true
# only stamp success once deps finished (waits iff deps is in the run)
wait_for = ["deps"]
run = 'printf %s "{{vars.setup_version}}" > .mise/setup && echo "✅ Setup v{{vars.setup_version}} stamped"'

[tasks."setup:check"] # fast probe (runs on `enter`); warns if setup is stale, never fails
hide = true
quiet = true
run = '[ "$(cat .mise/setup 2>/dev/null)" = "{{vars.setup_version}}" ] || echo "⚠️  Your setup is stale, run: mise run setup" >&2'

# ── 🪝 hooks ──────────────────────────────────────────────────────────────────
[hooks]
enter = "MISE_OFFLINE=1 mise run setup:check" # nudge when setup is stale; MISE_OFFLINE keeps cd offline-safe
postinstall = "hk install --mise"             # canonical hook install: runs after every `mise install`, idempotent

# ── ⚙️ settings ───────────────────────────────────────────────────────────────
[settings]
lockfile = true                     # write/commit mise.lock — REQUIRED before any pin resolves reproducibly
minimum_release_age = "7d"          # ignore releases <7d old (supply-chain cooldown)
disable_backends = ["asdf", "vfox"] # resolve only via verified backends
pipx.uvx = true                     # install pipx tools (yamllint) via uv; pip chokes on minimum_release_age's --uploaded-prior-to

# Use `gh` token to overcome github limits, fallback to gcm if gh is not working.
github.gh_cli_tokens = true
github.use_git_credentials = true
