# release-drafter autolabeler config (the release workflow runs the autolabeler sub-action, so ONLY
# these rules are live — there is no releaser and no version-resolver here). It applies CATEGORY labels
# that group the generated notes via .github/release.yml. The version bump is driven solely by bump
# labels (major/minor/patch/skip-release) in the release workflow; categories never affect the version.
autolabeler:
  - label: docs
    files:
      - '*.md'
  - label: enhancement
    title:
      - '/enhancement/i'
  - label: upgrades
    title:
      - '/⬆️/i'
  - label: bug
    title:
      - '/🐛|🐞|bug|bugfix/i'
  - label: auto-update
    title:
      - '/🤖/i'
  - label: feature
    title:
      - '/🚀|🎉/i'
