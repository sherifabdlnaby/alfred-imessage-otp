# Dependabot: version updates for Actions pins + npm deps under src/.
# Cooldown waits out the compromised-fresh-release window; groups collapse noise into one PR.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      # Actions tags are not SemVer-typed; only default-days is valid here.
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]
    labels: [auto-update, skip-release]
    commit-message:
      prefix: "ci"
  - package-ecosystem: npm
    directory: /src
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      npm:
        patterns: ["*"]
    labels: [auto-update, skip-release]
    commit-message:
      prefix: "chore"
