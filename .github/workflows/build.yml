name: Build Workflow

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    name: "Build & Publish"
    runs-on: macos-latest
    environment: build
    steps:
      - id: checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - run: npm install
        working-directory: ./src

      - name: Create Alfred Workflow
        id: create_alfred_workflow
        env:
          VERSION: ${{ github.event.release.tag_name }}
        working-directory: ./src
        run: |
          set -e
          version_without_v=$(echo "${VERSION}" | sed 's/^v//')
          sed -i '' "s/1.3.37/${version_without_v}/g" "./info.plist"

          mkdir -p build
          find . -not -path '*/.git*' -exec zip --symlinks "build/alfred-imessage-otp-${VERSION}.alfredworkflow" {} +
          echo "artifactPath=${PWD}/build/alfred-imessage-otp-${VERSION}.alfredworkflow" >> $GITHUB_ENV

      - uses: diamondburned/action-upload-release@main
        with:
          files: ${{ env.artifactPath }}
